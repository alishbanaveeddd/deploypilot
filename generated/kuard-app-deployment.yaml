apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuard-app
  namespace: default
  labels:
    app: kuard-app
    managed-by: deploypilot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kuard-app
  template:
    metadata:
      labels:
        app: kuard-app
    spec:
      containers:
      - name: kuard-app
        image: kuard-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        resources:
          limits:
            cpu: "250m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
